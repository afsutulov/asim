{% extends "base.html" %}
{% block title %}Вход — АСИМ{% endblock %}
{% block body %}
<div class="login-shell">
  <div class="login-card glass-card">
    <div class="login-brand">
      <img src="{{ url_for('static', filename='gerb.png') }}" alt="Герб" class="login-logo">
      <h1>Аналитическая Система Интеллектуального Мониторинга</h1>
    </div>
    <form method="post" class="login-form">
      <label>Имя пользователя
        <input type="text" name="username" required autocomplete="username">
      </label>
      <label>Пароль
        <input type="password" name="password" required autocomplete="current-password">
      </label>
      {% if error %}<div class="alert">{{ error }}</div>{% endif %}
      <button type="submit" class="primary-btn">Войти</button>
    </form>
  </div>
</div>
{% endblock %}
